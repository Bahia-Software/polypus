# Keep the GitHub Actions used by CI up to date (checkout, setup-python,
# rust-toolchain, rust-cache, ...). Rust/Python dependencies are deliberately
# not tracked here: there is no committed lockfile, so CI already resolves
# fresh semver-compatible versions on every run.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # One combined PR per weekly cycle instead of one PR per action.
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      # This action's tag is the Rust toolchain it installs — our MSRV pin
      # from the workspace Cargo.toml — not a version of the action itself.
      # "Updating" it would make the msrv CI job check a modern Rust instead
      # of the declared minimum. Bump it manually together with rust-version.
      - dependency-name: "dtolnay/rust-toolchain"
