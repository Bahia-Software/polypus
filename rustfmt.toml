# rustfmt configuration for the Polypus workspace.
# Every option below is stable-channel safe: `cargo fmt` works without nightly.
edition = "2021"
max_width = 100
use_small_heuristics = "Default"
newline_style = "Unix"
reorder_imports = true
reorder_modules = true
merge_derives = true
use_field_init_shorthand = true
use_try_shorthand = true

# --- Optional niceties that require NIGHTLY rustfmt (`cargo +nightly fmt`). ---
# Enable only if the team runs fmt on nightly AND the CI fmt job does too;
# otherwise stable `cargo fmt --check` will emit "unstable option" warnings.
# imports_granularity = "Crate"
# group_imports = "StdExternalCrate"
# wrap_comments = true
# comment_width = 100
# format_code_in_doc_comments = true
# normalize_comments = true