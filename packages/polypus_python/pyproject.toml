[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[project]
name = "polypus_python"
version = "0.0.2"
requires-python = ">=3.9"
dependencies = [
    "qiskit>=2.0",
    "qiskit-aer>=0.17",
    'importlib-metadata; python_version<"3.10"',
]

[project.optional-dependencies]
cunqa = ["cunqa"]

[tool.setuptools]
include-package-data = true
